# version: '3.8'

# 自定义网络，所有服务加入此网络实现容器名通信
networks:
  AI-platform:
    driver: bridge

# 数据卷持久化
volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_datanode3:
  hadoop_historyserver:
  mysql_data:
  redis_data:

services:
  # ========== Hadoop 3.3.6 集群 ==========
  namenode:
    # 关键更新：使用 bde2020 官方维护的 Hadoop 3.3.6-Java11 镜像
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.3.6-java11
    container_name: namenode
    hostname: namenode
    restart: always
    ports:
      - "9870:9870"      # HDFS Web UI (Hadoop 3.x 默认端口)
      - "9000:9000"      # HDFS RPC
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.6-java11
    container_name: datanode1
    hostname: datanode1
    restart: always
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.6-java11
    container_name: datanode2
    hostname: datanode2
    restart: always
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.6-java11
    container_name: datanode3
    hostname: datanode3
    restart: always
    volumes:
      - hadoop_datanode3:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.3.6-java11
    container_name: resourcemanager
    hostname: resourcemanager
    restart: always
    ports:
      - "8088:8088"      # YARN Web UI
    environment:
      - SERVICE_PRECONDITION=namenode:9870 datanode1:9864 datanode2:9864 datanode3:9864
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.3.6-java11
    container_name: nodemanager1
    hostname: nodemanager1
    restart: always
    ports:
      - "8042:8042"      # NodeManager Web UI
    environment:
      - SERVICE_PRECONDITION=namenode:9870 datanode1:9864 resourcemanager:8088
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.3.6-java11
    container_name: historyserver
    hostname: historyserver
    restart: always
    ports:
      - "8188:8188"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    environment:
      - SERVICE_PRECONDITION=namenode:9870 datanode1:9864 resourcemanager:8088
    env_file:
      - ./hadoop.env
    networks:
      - AI-platform

  # ========== Spark 3.5.4 集群 ==========
  spark-master:
    # 关键更新：使用 Bitnami 官方维护的 Spark 3.5.4 镜像，并声明 Hadoop 3.3 支持
    image: bitnami/spark:3.5.4-hadoop3
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"      # Spark Master Web UI
      - "7077:7077"      # Spark Master 端口
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./spark_apps:/opt/spark-apps
      - ./spark_data:/opt/spark-data
    networks:
      - AI-platform

  spark-worker:
    image: bitnami/spark:3.5.4-hadoop3
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"      # Spark Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./spark_apps:/opt/spark-apps
      - ./spark_data:/opt/spark-data
    networks:
      - AI-platform

  # ========== 基础设施 ==========
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-modelTrainDB}
      MYSQL_USER: ${MYSQL_USER:-modelmanager}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - AI-platform
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-123}
    volumes:
      - redis_data:/data
    networks:
      - AI-platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 后端服务 ==========
  django:
    build:
      context: ./backend/django
      dockerfile: Dockerfile
    container_name: django
    hostname: django
    restart: always
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: user_service.settings
      DATABASE_URL: mysql://${MYSQL_USER:-modelmanager}:${MYSQL_PASSWORD:-linyu0110}@mysql:3306/${MYSQL_DATABASE:-modelTrainDB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-linyu0110}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key}
      TRAIN_SVC_URL: http://fastapi:8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - AI-platform
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             uwsgi --ini uwsgi.ini"

  fastapi:
    build:
      context: ./backend/fastapi
      dockerfile: Dockerfile
    container_name: fastapi
    hostname: fastapi
    restart: always
    ports:
      - "8001:8001"
    environment:
      HDFS_NAMENODE: http://namenode:9870
      HDFS_HOST: namenode
      HDFS_FILE_PORT: 9000
      HDFS_USER: root
      DATABASE_URL: mysql://${MYSQL_USER:-modelmanager}:${MYSQL_PASSWORD:-linyu0110}@mysql:3306/${MYSQL_DATABASE:-modelTrainDB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-linyu0110}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key}
      SPARK_MASTER: spark://spark-master:7077
    depends_on:
      - namenode
      - datanode1
      - spark-master
      - mysql
      - redis
    networks:
      - AI-platform
    command: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8001

  # ========== 前端 (Nginx) ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    hostname: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - django
      - fastapi
    networks:
      - AI-platform